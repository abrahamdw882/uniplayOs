<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UniplayOS Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1f1f1f;
      --text: #e8e8e8;
      --muted: #777;
      --accent: #c8ff00;
    }

    body {
      background: var(--bg);
      font-family: system-ui, sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    #wrapper {
      width: min(100%, 980px);
      background: #0b0b0b;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(#171717, #101010);
      border-bottom: 1px solid var(--border);
    }

    #title {
      font-size: 1rem;
      font-weight: 600;
    }

    #header button,
    #controls button {
      background: none;
      border: 0;
      color: var(--text);
      font-size: 1rem;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    #header button:hover,
    #controls button:hover {
      color: var(--accent);
      background: #1a1a1a;
    }

    #stage {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    video,
    #embed-frame {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    #embed-frame {
      display: none;
      border: 0;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    #play-big {
      pointer-events: auto;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: rgba(0, 0, 0, 0.45);
      color: var(--accent);
      font-size: 1.8rem;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    #play-big:hover {
      transform: scale(1.05);
    }

    #controls {
      background: #141414;
    }

    #progress-wrap {
      height: 5px;
      background: #262626;
      position: relative;
      cursor: pointer;
    }

    #progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--accent);
      width: 0%;
      pointer-events: none;
    }

    #seek-slider {
      position: absolute;
      inset: 0;
      width: 100%;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }

    #row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      flex-wrap: wrap;
    }

    #time {
      font-variant-numeric: tabular-nums;
      color: #bbb;
      font-size: 0.86rem;
      min-width: 90px;
    }

    #vol {
      width: 90px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .spacer {
      flex: 1;
    }

    #status-bar {
      padding: 4px 16px 8px;
      font-size: 0.72rem;
      color: var(--muted);
      min-height: 24px;
      border-top: 1px solid var(--border);
      display: none;
    }

    #status-bar.visible {
      display: block;
    }

    @media (max-width: 600px) {
      #header {
        padding: 10px;
      }

      #title {
        font-size: 0.92rem;
      }

      #row {
        gap: 4px;
        padding: 8px;
      }

      #controls button,
      #header button {
        width: 34px;
        height: 34px;
        font-size: 0.92rem;
      }

      #vol {
        width: 60px;
      }

      #play-big {
        width: 58px;
        height: 58px;
        font-size: 1.4rem;
      }

      #time {
        font-size: 0.76rem;
        min-width: 74px;
      }
    }
  </style>
</head>
<body>

<div id="wrapper">
  <div id="header">
    <div id="title">UniplayOS Video</div>
    <div>
      <button aria-label="Info"><i class="fa-solid fa-circle-info"></i></button>
      <button aria-label="Message"><i class="fa-regular fa-message"></i></button>
      <button aria-label="More"><i class="fa-solid fa-ellipsis-vertical"></i></button>
    </div>
  </div>

  <div id="stage">
    <video id="video" playsinline></video>
    <iframe id="embed-frame" allowfullscreen allow="autoplay"></iframe>
    <div id="overlay">
      <button id="play-big" aria-label="Play"><i class="fa-solid fa-play"></i></button>
    </div>
  </div>

  <div id="controls">
    <div id="progress-wrap">
      <div id="progress-fill"></div>
      <input id="seek-slider" type="range" min="0" max="100" value="0" step="0.01">
    </div>
    <div id="row">
      <button id="btn-play" aria-label="Play/Pause"><i class="fa-solid fa-play"></i></button>
      <button id="btn-rewind" aria-label="Rewind"><i class="fa-solid fa-backward-step"></i></button>
      <button id="btn-forward" aria-label="Forward"><i class="fa-solid fa-forward-step"></i></button>
      <span id="time">0:00 / 0:00</span>
      <div class="spacer"></div>
      <button id="btn-mute" aria-label="Mute"><i class="fa-solid fa-volume-high"></i></button>
      <input id="vol" type="range" min="0" max="1" step="0.01" value="1">
      <button id="btn-fs" aria-label="Fullscreen"><i class="fa-solid fa-expand"></i></button>
    </div>
  </div>

  <div id="status-bar">Ready</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dashjs/4.7.4/dash.all.min.js"></script>

<script src="/js/utils/utils.js"></script>
<script src="/js/utils/resolver.js"></script>

<script>
  (function() {
    const video = document.getElementById('video');
    const stage = document.getElementById('stage');
    const embedFrame = document.getElementById('embed-frame');
    const btnPlay = document.getElementById('btn-play');
    const playBig = document.getElementById('play-big');
    const btnMute = document.getElementById('btn-mute');
    const btnFs = document.getElementById('btn-fs');
    const btnRewind = document.getElementById('btn-rewind');
    const btnForward = document.getElementById('btn-forward');
    const progressFill = document.getElementById('progress-fill');
    const progressWrap = document.getElementById('progress-wrap');
    const seekSlider = document.getElementById('seek-slider');
    const timeEl = document.getElementById('time');
    const volSlider = document.getElementById('vol');
    const statusBar = document.getElementById('status-bar');

    let hlsInstance = null;
    let dashInstance = null;
    let isReadySent = false;
    let isSeeking = false;
    let isDebugMode = false;

    function setStatus(msg) {
      statusBar.textContent = msg || '';
      statusBar.classList.toggle('visible', !!msg);
    }

    function sendEmbedEvent(action, payload) {
      window.parent.postMessage({ type: 'uniplayos', action, ...(payload || {}) }, '*');
    }

    function sendReadyIfNeeded() {
      if (!isReadySent) {
        isReadySent = true;
        sendEmbedEvent('ready');
      }
    }

    function updateAspectRatio() {
      if (!video.videoWidth || !video.videoHeight) return;
      const w = video.videoWidth;
      const h = video.videoHeight;
      stage.style.aspectRatio = w + ' / ' + h;
    }

    function destroyInstances() {
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }
      if (dashInstance) {
        dashInstance.reset();
        dashInstance = null;
      }
    }

    function showVideo() {
      video.style.display = 'block';
      embedFrame.style.display = 'none';
    }

    function showEmbed() {
      video.style.display = 'none';
      embedFrame.style.display = 'block';
    }

    function safePlay() {
      const p = video.play();
      if (p !== undefined) {
        p.catch(function() {});
      }
    }

    function getEmbedUrl(url) {
      if (Utils.isYouTube(url)) {
        var match = url.match(/(?:v=|youtu\.be\/|shorts\/)([a-zA-Z0-9_-]{11})/);
        return match ? 'https://www.youtube.com/embed/' + match[1] + '?autoplay=1&enablejsapi=1' : url;
      }
      if (Utils.isVimeo(url)) {
        var match = url.match(/vimeo\.com\/(\d+)/);
        return match ? 'https://player.vimeo.com/video/' + match[1] + '?autoplay=1' : url;
      }
      return url;
    }

    function loadUrl(rawUrl, autoplay) {
      if (!rawUrl) return;
      destroyInstances();
      isReadySent = false;

      try {
        var resolver = new Resolver();
        var result = resolver.resolve(rawUrl);
        var src = result.proxyRequired ? resolver.getProxyUrl(rawUrl) : rawUrl;

        if (result.strategy === 'iframe') {
          showEmbed();
          embedFrame.src = getEmbedUrl(rawUrl);
          stage.style.aspectRatio = '16 / 9';
          sendReadyIfNeeded();
          return;
        }

        showVideo();
        stage.style.aspectRatio = '16 / 9';

        var onMediaReady = function() {
          updateAspectRatio();
          sendReadyIfNeeded();
          if (autoplay) safePlay();
        };

        if (result.type === 'hls') {
          if (Hls.isSupported()) {
            hlsInstance = new Hls();
            hlsInstance.loadSource(src);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, onMediaReady);
            hlsInstance.on(Hls.Events.ERROR, function(_, data) {
              if (data.fatal) {
                sendEmbedEvent('error', { message: 'HLS fatal error' });
              }
            });
          } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = src;
            video.addEventListener('loadedmetadata', onMediaReady, { once: true });
            if (autoplay) safePlay();
          }
        } else if (result.type === 'dash') {
          dashInstance = dashjs.MediaPlayer().create();
          dashInstance.initialize(video, src, true);
          dashInstance.on('streamInitialized', onMediaReady);
        } else {
          video.src = src;
          video.addEventListener('loadedmetadata', onMediaReady, { once: true });
          if (autoplay) safePlay();
        }
      } catch (err) {
        console.error('Resolver error:', err);
        setStatus('Invalid URL');
      }
    }

    function togglePlay() {
      if (video.paused) {
        safePlay();
      } else {
        video.pause();
      }
    }

    function setIcon(btn, icon) {
      var i = btn.querySelector('i');
      if (i) {
        i.className = 'fa-solid fa-' + icon;
      }
    }

    function updateProgress() {
      if (!video.duration) return;
      var pct = (video.currentTime / video.duration) * 100;
      progressFill.style.width = pct + '%';
      if (!isSeeking) {
        seekSlider.value = pct;
      }
      timeEl.textContent = Utils.formatTime(video.currentTime) + ' / ' + Utils.formatTime(video.duration);
    }

    video.addEventListener('loadedmetadata', function() {
      updateAspectRatio();
      sendReadyIfNeeded();
    });

    video.addEventListener('play', function() {
      setIcon(btnPlay, 'pause');
      setIcon(playBig, 'pause');
      sendEmbedEvent('play');
    });

    video.addEventListener('pause', function() {
      setIcon(btnPlay, 'play');
      setIcon(playBig, 'play');
      sendEmbedEvent('pause');
    });

    video.addEventListener('ended', function() {
      sendEmbedEvent('ended');
    });

    video.addEventListener('error', function() {
      setStatus('Failed to load media.');
      sendEmbedEvent('error', { message: 'Video error' });
    });

    video.addEventListener('timeupdate', updateProgress);

    seekSlider.addEventListener('input', function(e) {
      isSeeking = true;
      var pct = parseFloat(e.target.value);
      progressFill.style.width = pct + '%';
      if (video.duration) {
        var time = (pct / 100) * video.duration;
        timeEl.textContent = Utils.formatTime(time) + ' / ' + Utils.formatTime(video.duration);
      }
    });

    seekSlider.addEventListener('change', function(e) {
      isSeeking = false;
      var pct = parseFloat(e.target.value);
      if (video.duration) {
        video.currentTime = (pct / 100) * video.duration;
      }
    });

    progressWrap.addEventListener('click', function(e) {
      var rect = progressWrap.getBoundingClientRect();
      var x = (e.clientX - rect.left) / rect.width;
      x = Math.max(0, Math.min(1, x));
      if (video.duration) {
        video.currentTime = x * video.duration;
      }
    });

    btnPlay.addEventListener('click', togglePlay);
    playBig.addEventListener('click', togglePlay);

    btnRewind.addEventListener('click', function() {
      video.currentTime = Math.max(0, video.currentTime - 10);
    });

    btnForward.addEventListener('click', function() {
      video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
    });

    btnMute.addEventListener('click', function() {
      video.muted = !video.muted;
      setIcon(btnMute, video.muted ? 'volume-xmark' : 'volume-high');
    });

    volSlider.addEventListener('input', function() {
      video.volume = parseFloat(volSlider.value);
    });

    btnFs.addEventListener('click', function() {
      if (!document.fullscreenElement) {
        if (stage.requestFullscreen) {
          stage.requestFullscreen().catch(function() {});
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    });

    document.addEventListener('fullscreenchange', function() {
      if (!document.fullscreenElement) {
        updateAspectRatio();
      }
    });

    var urlInput = document.createElement('input');
    urlInput.type = 'text';
    urlInput.id = 'debug-url';
    urlInput.style.display = 'none';

    var loadBtn = document.createElement('button');
    loadBtn.id = 'debug-load';
    loadBtn.textContent = 'Load';
    loadBtn.style.display = 'none';

    document.body.appendChild(urlInput);
    document.body.appendChild(loadBtn);

    loadBtn.addEventListener('click', function() {
      loadUrl(urlInput.value.trim(), false);
    });

    urlInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        loadUrl(urlInput.value.trim(), false);
      }
    });

    var params = new URLSearchParams(window.location.search);
    var sourceParam = params.get('source') || params.get('url');
    var autoplayParam = params.get('autoplay') === 'true';
    var debugParam = params.get('debug') === 'true';

    if (debugParam || params.get('debug') === '') {
      urlInput.style.display = 'block';
      loadBtn.style.display = 'inline-block';
      urlInput.style.width = '80%';
      urlInput.style.margin = '8px auto';
      urlInput.style.display = 'block';
      urlInput.style.background = '#1a1a1a';
      urlInput.style.border = '1px solid #333';
      urlInput.style.color = '#e8e8e8';
      urlInput.style.padding = '6px 12px';
      urlInput.style.borderRadius = '6px';
      urlInput.style.fontSize = '0.85rem';
      loadBtn.style.display = 'block';
      loadBtn.style.margin = '4px auto 8px';
      loadBtn.style.background = 'transparent';
      loadBtn.style.border = '1px solid var(--accent)';
      loadBtn.style.color = 'var(--accent)';
      loadBtn.style.padding = '4px 16px';
      loadBtn.style.borderRadius = '4px';
      loadBtn.style.cursor = 'pointer';
      loadBtn.style.fontSize = '0.8rem';
      setStatus('Debug mode enabled');
    }

    if (sourceParam) {
      urlInput.value = sourceParam;
      loadUrl(sourceParam, autoplayParam);
    } else {
      setTimeout(sendReadyIfNeeded, 300);
    }

    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || data.type !== 'uniplayos') return;
      switch (data.action) {
        case 'play':
          safePlay();
          break;
        case 'pause':
          video.pause();
          break;
        case 'togglePlay':
          togglePlay();
          break;
        case 'seek':
          if (data.time !== undefined) video.currentTime = data.time;
          break;
        case 'setVolume':
          if (data.level !== undefined) {
            var v = Math.max(0, Math.min(1, data.level));
            video.volume = v;
            volSlider.value = v;
          }
          break;
        case 'toggleMute':
          video.muted = !video.muted;
          setIcon(btnMute, video.muted ? 'volume-xmark' : 'volume-high');
          break;
        case 'toggleFullscreen':
          if (!document.fullscreenElement) {
            if (stage.requestFullscreen) stage.requestFullscreen().catch(function() {});
          } else {
            if (document.exitFullscreen) document.exitFullscreen();
          }
          break;
        case 'load':
          if (data.source) loadUrl(data.source, false);
          break;
        case 'destroy':
          destroyInstances();
          video.pause();
          video.src = '';
          embedFrame.src = '';
          break;
        default:
          break;
      }
    });
  })();
</script>

</body>
</html>
